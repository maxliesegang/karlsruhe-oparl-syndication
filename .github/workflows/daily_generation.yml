name: Feed Generation

on:
  schedule:
    - cron: '0 2 * * *'  # Runs at 02:00 UTC every day
    - cron: '0 14 * * *'  # Runs at 14:00 UTC every day
  workflow_dispatch:  # Allows manual triggering

# Never let a manual run and a scheduled run push concurrently; the loser would
# fail on a non-fast-forward. Queue them instead of cancelling so no run is lost.
concurrency:
  group: feed-generation
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # This gives the job permission to push changes

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch all history for .GitInfo and .Lastmod

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install dependencies
      run: npm ci

    - name: Validate project
      run: npm run typecheck && npm run lint && npm test && npm run build && npm run smoke

    - name: Run generate script
      run: npm run generate

    # Rejects a malformed, empty or unexpectedly shrunken feed before it can be
    # committed. Runs in-repo (npm run validate:feed) so the same check is
    # reproducible locally and does not depend on the runner image's tooling.
    - name: Validate generated feeds
      run: npm run validate:feed

    - name: Commit and push if changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add -A
        dateFormatted=$(date -u +"%Y-%m-%d %H:%M:%S")
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Auto-generate feed - $dateFormatted"
          # Reconcile with any push that landed while this run was working.
          git pull --rebase --autostash origin "$(git rev-parse --abbrev-ref HEAD)"
          git push
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
